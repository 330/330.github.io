<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kedi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { 
  background:#050505; 
  color:#e5e5e5; 
  font-family:'Inter',sans-serif; 
  overflow-x:hidden;
}

/* BABY BLUE AURA */
.aura {
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(173,216,230,0.25), transparent 70%);
  filter:blur(120px);
  z-index:0;
}

.card { 
  background:rgba(15,15,15,0.65); 
  backdrop-filter: blur(25px); 
  border:1px solid #1c1c1c; 
  border-radius:20px; 
  padding:16px; 
  transition:.3s; 
}

.card:hover { 
  background:#141414; 
  border-color:#2a2a2a; 
  transform:translateY(-2px);
}

.status-dot { width:12px; height:12px; border-radius:50%; border:2px solid #0f0f0f; }
.badge-img { width:18px; height:18px; }

.activity-slot { 
  background: rgba(255,255,255,0.03); 
  border:1px solid rgba(255,255,255,0.05); 
  padding:10px; 
  border-radius:12px; 
  transition:.2s;
}

.activity-slot:hover {
  background: rgba(173,216,230,0.08);
}

</style>
</head>

<body class="flex justify-center items-start min-h-screen p-10">

<div class="aura top-20 left-20"></div>
<div class="aura bottom-10 right-20"></div>

<div class="flex gap-10 max-w-6xl w-full relative z-10">

<!-- LEFT -->
<div class="flex-1 space-y-4">

<div class="card flex items-center gap-6 p-6">
<div class="relative">
<img id="avatar" class="w-28 h-28 rounded-full object-cover shadow-xl">
<div id="status" class="absolute bottom-1 right-1 status-dot"></div>
</div>

<div>
<h1 class="text-4xl font-extrabold">kedi</h1>
<span id="statusText" class="text-xs px-2 py-1 bg-white/5 rounded">loading</span>

<p class="text-sm text-gray-400 mt-3">
 digital <span class="text-white">minimalist</span>
</p>

<div class="flex gap-2 mt-4">
<a href="/dnd" class="bg-white text-black text-xs px-5 py-2 rounded-full font-bold hover:scale-105 transition">SSS</a>
<a href="https://x.com/shininglikehell" target="_blank" class="bg-white/10 text-xs px-4 py-2 rounded-full hover:bg-white/20">x</a>
<a href="https://www.pinterest.com/k9d1/" target="_blank" class="bg-white/10 text-xs px-4 py-2 rounded-full hover:bg-white/20">pinterest</a>
</div>
</div>
</div>

<!-- DISCORD CARD -->
<div class="card p-5">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<img id="dAvatar" class="w-14 h-14 rounded-full">
<div>
<p class="text-sm">kedi</p>
<p id="activity" class="text-xs text-green-400">Loading...</p>
</div>
</div>
<div id="badges" class="flex gap-1"></div>
</div>

<div id="activities" class="mt-4 space-y-2"></div>
</div>

</div>

<!-- RIGHT -->
<div class="w-80 space-y-4">

<div class="card">
<p class="text-sm mb-2">Roblox</p>
<div class="flex items-center gap-3">
<img id="robloxAvatar" class="w-10 h-10 rounded-lg">
<div>
<p id="robloxName" class="text-xs font-bold"></p>
<p id="robloxStats" class="text-[10px] text-gray-500"></p>
</div>
</div>
</div>

<div class="card">
<p class="text-sm mb-2">GitHub</p>
<div>
<p id="ghName" class="text-xs font-bold"></p>
<p id="ghStats" class="text-[10px] text-gray-500"></p>
</div>
</div>

<a href="https://open.spotify.com/user/11156226173" target="_blank" class="card block">
<p class="text-sm">Spotify</p>
<p class="text-xs text-gray-500">Open profile ↗</p>
</a>

</div>
</div>

<script>
const userID = "377152186234437633";
const robloxUserId = "424077529";

function loadBadges(flags) {
 const container = document.getElementById("badges");
 container.innerHTML = "";
 const badgeUrls = {
 1:"discordstaff",2:"discordpartner",4:"hypesquad",8:"bughunterlevel1",
 64:"hypesquadbravery",128:"hypesquadbrilliance",256:"hypesquadbalance",
 512:"earlysupporter",131072:"verifiedbotdeveloper",4194304:"active_developer"
 };

 for (const [bit,name] of Object.entries(badgeUrls)){
  if(flags & parseInt(bit)){
   container.innerHTML += `<img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/${name}.svg" class="badge-img">`;
  }
 }
}

async function load(){

try{
 const r = await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
 const {data} = await r.json();

 const avatar = `https://cdn.discordapp.com/avatars/${userID}/${data.discord_user.avatar}.png`;
 document.getElementById("avatar").src = avatar;
 document.getElementById("dAvatar").src = avatar;

 const colors={online:'bg-green-500',idle:'bg-yellow-500',dnd:'bg-red-500',offline:'bg-gray-500'};
 document.getElementById("status").className=`absolute bottom-1 right-1 status-dot ${colors[data.discord_status]}`;
 document.getElementById("statusText").innerText=data.discord_status;

 loadBadges(data.discord_user.public_flags||0);

 const container=document.getElementById("activities");
 container.innerHTML="";

 if(data.listening_to_spotify){
 container.innerHTML+=`<div class="activity-slot flex gap-3 items-center">
 <img src="${data.spotify.album_art_url}" class="w-12 h-12 rounded">
 <div><p class="text-xs text-green-400">Listening</p>
 <p class="text-sm">${data.spotify.song}</p></div></div>`;
 }

 data.activities.forEach(act=>{
 if(act.type===4||act.name==="Spotify") return;

 let img="🎮";
 if(act.assets?.large_image){
 img=`<img src="https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.png" class="w-12 h-12 rounded">`;
 }

 container.innerHTML+=`<div class="activity-slot flex gap-3 items-center">${img}<div>
 <p class="text-xs text-gray-400">Playing</p>
 <p class="text-sm">${act.name}</p></div></div>`;
 });

}catch(e){console.warn("lanyard failed",e)}

try{
 const user=await fetch(`https://users.roblox.com/v1/users/${robloxUserId}`).then(r=>r.json());
 const followers=await fetch(`https://friends.roblox.com/v1/users/${robloxUserId}/followers/count`).then(r=>r.json());
 const thumb=await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${robloxUserId}&size=150x150&format=Png`).then(r=>r.json());

 document.getElementById("robloxAvatar").src = thumb.data?.[0]?.imageUrl || "";
 document.getElementById("robloxName").innerText = user.name || "roblox";
 document.getElementById("robloxStats").innerText = `${followers.count || 0} followers`;
}catch(e){console.warn("roblox failed",e)}

try{
 const gh=await fetch("https://api.github.com/users/330").then(r=>r.json());
 document.getElementById("ghName").innerText=gh.login || "github";
 document.getElementById("ghStats").innerText=`${gh.followers||0} followers • ${gh.public_repos||0} repos`;
}catch(e){console.warn("github failed",e)}

}

load();
setInterval(load,15000);
</script>

</body>
</html>
