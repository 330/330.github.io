<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kvdi | dnd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .btn { transition: 0.2s ease; opacity: 0.8; border: 1px solid #30363d; }
        .btn:hover { opacity: 1; background-color: #21262d; transform: translateY(-2px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xs">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">kvdi</h1>
            <p class="text-slate-500 text-xs mt-1 italic">just thinking</p>
        </div>

        <div class="card p-4 mb-8 flex items-center gap-4">
            <div class="relative">
                <div class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-slate-400">K</div>
                <div id="status-dot" class="absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full border-2 border-[#161b22] bg-gray-500"></div>
            </div>
            <div class="overflow-hidden">
                <p id="discord-activity" class="text-sm font-semibold text-white truncate text-ellipsis">Yükleniyor...</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Discord</p>
            </div>
        </div>

        <div class="space-y-3">
            <a href="https://discord.com/users/377152186234437633" target="_blank" class="card btn p-3 flex items-center justify-center gap-2">
                <span class="text-sm font-medium">Discord</span>
            </a>
            <a href="https://pinterest.com/k9d1" target="_blank" class="card btn p-3 flex items-center justify-center gap-2">
                <span class="text-sm font-medium">Pinterest</span>
            </a>
            <a href="https://github.com/330" target="_blank" class="card btn p-3 flex items-center justify-center gap-2">
                <span class="text-sm font-medium">GitHub</span>
            </a>
        </div>

        <div class="text-center mt-12">
            <p class="text-[9px] text-slate-700 tracking-[0.3em]">KVDI.SPACE</p>
        </div>
    </div>

    <script>
        const userID = "377152186234437633"; // Kendi Discord ID'ni buraya yaz!
        async function updateStatus() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
                const d = await r.json();
                const data = d.data;
                
                // Durum Noktası Renkleri
                const dot = document.getElementById('status-dot');
                const colors = { online: 'bg-green-500', idle: 'bg-yellow-500', dnd: 'bg-red-500', offline: 'bg-gray-500' };
                dot.className = `absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full border-2 border-[#161b22] ${colors[data.discord_status]}`;

                // Aktivite Metni
                const act = document.getElementById('discord-activity');
                if (data.listening_to_spotify) {
                    act.innerText = `Spotify: ${data.spotify.song}`;
                } else if (data.activities.length > 0) {
                    act.innerText = data.activities[0].name;
                } else {
                    act.innerText = data.discord_status.toUpperCase();
                }
            } catch (e) { console.error("Lanyard error"); }
        }
        updateStatus();
        setInterval(updateStatus, 15000);
    </script>
</body>
</html>
