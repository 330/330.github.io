<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kedi</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    body { background:#050505; color:#e5e5e5; font-family:'Inter',sans-serif; margin:0; overflow-x:hidden; }
    .card { background:rgba(15,15,15,0.6); backdrop-filter: blur(20px); border:1px solid #1c1c1c; border-radius:24px; padding:20px; transition:.4s ease; }
    .card:hover { border-color:#3b82f640; background:rgba(20,20,20,0.8); transform: translateY(-2px); }
    .status-dot { width:12px; height:12px; border-radius:50%; border:2px solid #0f0f0f; }
    
    .glow { 
        position:absolute; width:600px; height:600px; 
        background:radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%); 
        filter:blur(100px); z-index:0; pointer-events: none;
    }

    .activity-slot { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; transition: 0.3s; }
    .badge-img { width: 18px; height: 18px; }
    
    /* Butonlar için özel kutu stili */
    .btn-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; min-width: 80px; }
    .btn-box:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
</style>
</head>

<body class="flex justify-center items-start min-h-screen p-6 md:p-10 relative">

<div class="glow top-20 right-40"></div>

<div class="flex flex-col md:flex-row gap-8 max-w-6xl w-full relative z-10">

    <div class="flex-1 space-y-4">
        
        <div class="card flex flex-col sm:flex-row items-center gap-8 p-8">
            <div class="relative">
                <img id="avatar" class="w-32 h-32 rounded-full object-cover shadow-2xl border border-white/5">
                <div id="status" class="absolute bottom-2 right-2 status-dot"></div>
            </div>

            <div class="text-center sm:text-left">
                <div class="flex items-center justify-center sm:justify-start gap-3">
                    <h1 class="text-5xl font-extrabold tracking-tighter text-white">kedi</h1>
                    <span id="statusText" class="text-[10px] px-2 py-0.5 rounded bg-white/5 border border-white/10 text-gray-500 uppercase font-bold tracking-widest">loading</span>
                </div>
                
                <p class="text-gray-400 mt-4 text-sm leading-relaxed">
                    wandering in <span class="text-white">digital space</span>. <br>
                    dreaming, building, and just <span class="text-blue-400">being</span>.
                </p>

                <div class="flex flex-wrap gap-3 mt-6 justify-center sm:justify-start">
                    <a href="/dnd" class="bg-white text-black text-[11px] px-8 py-2.5 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-white/5">SSS</a>
                    <a href="https://x.com/shininglikehell" target="_blank" class="btn-box text-xs font-medium text-gray-300 hover:text-white">X</a>
                    <a href="https://www.pinterest.com/k9d1/" target="_blank" class="btn-box text-xs font-medium text-gray-300 hover:text-white">Pinterest</a>
                </div>
            </div>
        </div>

        <div class="card space-y-4">
            <div class="flex items-center justify-between opacity-50">
                <p class="text-[9px] font-black uppercase tracking-[0.3em]">Live Activity</p>
                <div id="badges" class="flex gap-1.5"></div>
            </div>
            <div id="activities" class="space-y-3">
                <p class="text-xs text-gray-600 italic">Checking pulse...</p>
            </div>
        </div>
    </div>

    <div class="w-full md:w-80 space-y-4">
        
        <a href="https://www.roblox.com/users/424077529/profile" target="_blank" class="card block group">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Roblox</p>
            <div class="flex items-center gap-3">
                <img src="https://tr.rbxcdn.com/30day-avatar-headshot/150/150/AvatarHeadshot/Png" class="w-10 h-10 rounded-lg bg-black/40">
                <div>
                    <p class="text-xs font-bold text-white group-hover:text-blue-400 transition">kvdir</p>
                    <p class="text-[10px] text-gray-500">@kdrkdr_12</p>
                </div>
            </div>
        </a>

        <a href="https://github.com/330" target="_blank" class="card block group">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">GitHub</p>
            <div class="flex items-center gap-3">
                <img src="https://github.com/330.png" class="w-10 h-10 rounded-lg">
                <div>
                    <p class="text-xs font-bold text-white group-hover:text-blue-400 transition">330</p>
                    <p class="text-[10px] text-gray-500">View Repositories</p>
                </div>
            </div>
        </a>

        <a href="http://googleusercontent.com/spotify.com/5" target="_blank" class="card block group">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Spotify</p>
            <div class="flex items-center justify-between font-medium">
                <span class="text-xs text-gray-400 group-hover:text-white transition">Open Profile</span>
                <span class="text-blue-500 opacity-50">↗</span>
            </div>
        </a>
    </div>
</div>

<script>
const userID = "377152186234437633";

function loadBadges(flags) {
    const container = document.getElementById("badges");
    container.innerHTML = "";
    const badgeUrls = {
        1: "discordstaff", 2: "discordpartner", 4: "hypesquad", 8: "bughunterlevel1",
        64: "hypesquadbravery", 128: "hypesquadbrilliance", 256: "hypesquadbalance",
        512: "earlysupporter", 131072: "verifiedbotdeveloper", 4194304: "active_developer"
    };
    for (const [bit, name] of Object.entries(badgeUrls)) {
        if (flags & bit) {
            container.innerHTML += `<img src="https://raw.githubusercontent.com/mezotv/discord-badges/main/assets/${name}.svg" class="badge-img">`;
        }
    }
}

async function load(){
    try {
        const r = await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
        const {data} = await r.json();
        const avatarHash = data.discord_user.avatar;
        document.getElementById("avatar").src = `https://cdn.discordapp.com/avatars/${userID}/${avatarHash}.${avatarHash.startsWith("a_") ? "gif" : "png"}?size=512`;
        const statusColors = {online:'bg-green-500', idle:'bg-yellow-500', dnd:'bg-red-500', offline:'bg-gray-700'};
        document.getElementById("status").className = `absolute bottom-2 right-2 status-dot ${statusColors[data.discord_status]}`;
        document.getElementById("statusText").innerText = data.discord_status;
        loadBadges(data.discord_user.public_flags);
        const container = document.getElementById("activities");
        container.innerHTML = "";
        if (data.listening_to_spotify) {
            container.innerHTML += `<div class="activity-slot flex items-center gap-4 border-blue-500/10"><img src="${data.spotify.album_art_url}" class="w-12 h-12 rounded-xl border border-white/5 shadow-lg"><div class="overflow-hidden"><p class="text-[9px] font-black text-blue-400 uppercase tracking-tighter mb-0.5 italic">Spotify</p><p class="text-sm font-bold text-white truncate">${data.spotify.song}</p><p class="text-[10px] text-gray-500 truncate">${data.spotify.artist}</p></div></div>`;
        }
        data.activities.forEach(act => {
            if (act.type === 4 || act.id === "spotify:1") return;
            const actImg = act.assets ? `https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.png` : null;
            const typeText = ["Playing", "Streaming", "Listening", "Watching", "Custom", "Competing"][act.type];
            container.innerHTML += `<div class="activity-slot flex items-center gap-4"><div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center overflow-hidden">${actImg ? `<img src="${actImg}" class="w-full h-full object-cover">` : '🎮'}</div><div class="overflow-hidden"><p class="text-[9px] font-black text-gray-500 uppercase tracking-tighter mb-0.5 italic">${typeText}</p><p class="text-sm font-bold text-white truncate">${act.name}</p>${act.details ? `<p class="text-[10px] text-gray-500 truncate">${act.details}</p>` : ''}</div></div>`;
        });
        if (container.innerHTML === "") container.innerHTML = `<p class="text-xs text-gray-700 text-center py-2 italic font-medium tracking-tight opacity-50">not much happening right now</p>`;
    } catch (e) { console.error(e); }
}

load();
setInterval(load, 15000);
</script>

</body>
</html>
