<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:type" content="website">
    <meta property="og:title" content="kedi">
    <meta property="og:description" content="Just a dreamer wandering through the digital space. ✨">
    <meta property="og:url" content="https://kvdi.space">
    <meta property="og:image" content="https://kedi.is-serious.business/9gGwcJT.png">
    <meta name="theme-color" content="#050505">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kedi</title>
    <link rel="icon" type="image/png" href="https://kedi.is-serious.business/9gGwcJT.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ededed; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .aura {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(173, 216, 230, 0.12), transparent 70%);
            filter: blur(100px); z-index: -1; pointer-events: none;
        }

        .bento-card { 
            background: rgba(17, 17, 17, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 28px; 
            padding: 24px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            height: 100%; 
        }
        
        .bento-card:hover { 
            border-color: rgba(173, 216, 230, 0.2); 
            background: rgba(22, 22, 22, 0.8); 
            transform: translateY(-4px);
        }

        .status-dot { width: 18px; height: 18px; border-radius: 50%; border: 4px solid #111; }
        
        .spotify-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); overflow: hidden; margin-top: 12px; }
        .spotify-progress { height: 100%; background: #1DB954; transition: width 1s linear; }

        @keyframes pulse-aura {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .animate-aura { animation: pulse-aura 8s infinite ease-in-out; }
    </style>
</head>
<body class="flex justify-center items-center py-12 px-6 min-h-screen relative">

    <div class="aura top-[-10%] left-[-10%] animate-aura"></div>
    <div class="aura bottom-[-10%] right-[-10%] animate-aura" style="background: radial-gradient(circle, rgba(173, 216, 230, 0.08), transparent 70%);"></div>

    <div class="w-full max-w-4xl space-y-6 relative z-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 bento-card flex flex-col md:flex-row items-center gap-10 p-10">
                <div class="relative inline-flex group">
                    <img id="discord-avatar" class="w-36 h-36 rounded-full border-2 border-white/5 object-cover shadow-2xl block bg-[#0a0a0a] transition group-hover:scale-105 duration-500">
                    <div id="status-indicator" class="absolute bottom-2 right-2 status-dot bg-gray-500"></div>
                </div>
                <div class="text-center md:text-left">
                    <div class="flex items-center gap-4 justify-center md:justify-start">
                        <h1 class="text-5xl font-extrabold tracking-tighter text-white">kedi</h1>
                        <span id="status-text" class="text-[10px] px-3 py-1 rounded-full bg-white/5 text-slate-400 uppercase font-black tracking-[0.2em] border border-white/5 italic">Checking...</span>
                    </div>
                    <p class="text-slate-400 mt-5 text-lg leading-relaxed max-w-md">
                        digital <span class="text-white font-semibold">minimalist</span> and a dream chaser. 🌙 <br>
                        building <span class="text-blue-200">aesthetic</span> things while listening to life. 
                    </p>
                    <div class="mt-8 flex gap-4 justify-center md:justify-start">
                        <a href="/dnd" class="bg-white text-black text-[11px] font-black py-3 px-10 rounded-full hover:scale-105 transition shadow-[0_10px_20px_rgba(255,255,255,0.1)] uppercase tracking-widest">SSS</a>
                    </div>
                </div>
            </div>

            <div class="bento-card flex flex-col justify-between p-10">
                <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-6">Connections</h3>
                <div class="space-y-5">
                    <a href="https://www.roblox.com/users/424077529/profile" target="_blank" class="flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-300 group-hover:text-blue-300 transition">Roblox</span>
                        <span class="text-slate-700 group-hover:translate-x-1 transition-transform opacity-50">↗</span>
                    </a>
                    <a href="https://x.com/shininglikehell" target="_blank" class="flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-300 group-hover:text-blue-400 transition">X / Twitter</span>
                        <span class="text-slate-700 group-hover:translate-x-1 transition-transform opacity-50">↗</span>
                    </a>
                    <a href="https://pinterest.com/k9d1" target="_blank" class="flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-300 group-hover:text-red-400 transition">Pinterest</span>
                        <span class="text-slate-700 group-hover:translate-x-1 transition-transform opacity-50">↗</span>
                    </a>
                    <a href="https://github.com/330" target="_blank" class="flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-300 group-hover:text-purple-400 transition">GitHub</span>
                        <span class="text-slate-700 group-hover:translate-x-1 transition-transform opacity-50">↗</span>
                    </a>
                    <a href="https://discord.com/users/377152186234437633" target="_blank" class="flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-300 group-hover:text-[#5865F2] transition">Discord</span>
                        <span class="text-slate-700 group-hover:translate-x-1 transition-transform opacity-50">↗</span>
                    </a>
                </div>
            </div>

            <div class="md:col-span-3 bento-card p-10">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Listening Experience</h3>
                    <a href="https://open.spotify.com/user/3" target="_blank" class="text-[10px] text-[#1DB954] font-black tracking-widest hover:opacity-70 transition uppercase">Spotify Profile</a>
                </div>
                <div id="spotify-container">
                    <div class="bg-white/[0.02] p-10 rounded-[32px] flex items-center justify-center border border-white/5">
                        <p class="text-xs text-slate-600 italic tracking-wide">Silence is also a sound...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userID = "377152186234437633";
        
        async function fetchPresence() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${userID}`);
                const { data } = await r.json();
                
                const avatar = document.getElementById('discord-avatar');
                const indicator = document.getElementById('status-indicator');
                const statusText = document.getElementById('status-text');
                
                const colors = { 
                    online: 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]', 
                    idle: 'bg-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.5)]', 
                    dnd: 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]', 
                    offline: 'bg-gray-500' 
                };

                const avatarHash = data.discord_user.avatar;
                const avatarExt = avatarHash.startsWith("a_") ? "gif" : "png";
                avatar.src = `https://cdn.discordapp.com/avatars/${userID}/${avatarHash}.${avatarExt}?size=512`;

                indicator.className = `absolute bottom-2 right-2 status-dot ${colors[data.discord_status] || 'bg-gray-500'}`;
                statusText.innerText = data.discord_status;

                const spotifyContainer = document.getElementById('spotify-container');
                if (data.listening_to_spotify) {
                    const track = data.spotify;
                    const progress = ((Date.now() - track.timestamps.start) / (track.timestamps.end - track.timestamps.start)) * 100;

                    spotifyContainer.innerHTML = `
                        <div class="bg-white/[0.03] p-8 rounded-[32px] flex flex-col md:flex-row items-center gap-8 border border-white/5">
                            <img src="${track.album_art_url}" class="w-28 h-28 rounded-2xl shadow-2xl transition hover:scale-105 duration-500">
                            <div class="flex-1 w-full text-center md:text-left overflow-hidden">
                                <p class="text-[10px] text-[#1DB954] font-black uppercase tracking-[0.2em] mb-2 italic">Live on Spotify</p>
                                <p class="text-2xl font-bold text-white truncate mb-1">${track.song}</p>
                                <p class="text-base text-slate-400 truncate">by ${track.artist}</p>
                                <div class="spotify-bar">
                                    <div class="spotify-progress" style="width: ${Math.min(progress, 100)}%"></div>
                                </div>
                            </div>
                        </div>`;
                } else {
                    spotifyContainer.innerHTML = `<div class="bg-white/[0.02] p-10 rounded-[32px] flex items-center justify-center border border-white/5"><p class="text-xs text-slate-600 italic tracking-wide">Silence is also a sound...</p></div>`;
                }
            } catch (e) { console.error(e); }
        }

        fetchPresence();
        setInterval(fetchPresence, 1000);
    </script>
</body>
</html>
